TRAIN:
  train_batch_size: 8
  lr: 0.0003

  valid_batch_size: 8

  image_size: [224,224]

  min_epochs: 100
  max_epochs: 200
  patience: 100

  device: 1

  model_save_path_min_loss: ./save_model
  model_save_filename_min_loss: medseg_min_loss

  model_save_path_max_dice: ./save_model
  model_save_filename_max_dice: medseg_max_dice

  custom_log_dir: ./save_model

MODEL:
#  bert_type: ./lib/BiomedVLP-CXR-BERT-specialized
  bert_type: ./lib/BiomedNLP-BiomedBERT-base-uncased-abstract
#  bert_type: ./lib/Bio_ClinicalBERT
#  bert_type: ./lib/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224
