  vision_type: ./lib/convnext-tiny-224
#  vision_type: ./lib/swin-tiny-patch4-window7-224
#  vision_type: ./lib/dinov3-convnext-tiny-pretrain-lvd1689m
#  vision_type: ./lib/convnextv2-tiny-1k-224
#  vision_type: ./lib/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224
  project_dim: 768

